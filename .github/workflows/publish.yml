name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          check-latest: true
          server-id: github
          cache: maven

      - name: Verify Java toolchain
        run: |
          java -version
          javac -version
          ./mvnw -version

      - name: Build and deploy
        run: ./mvnw -B -ntp deploy
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
